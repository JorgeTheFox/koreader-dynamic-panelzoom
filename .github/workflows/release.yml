name: Create Release

on:
  push:
    tags:
      - 'v*' # Triggered by tags like v1.0, v1.0.1, etc.

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Silences Node.js warnings
    permissions:
      contents: write # Needed to create releases and upload assets
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Package plugin for release
        id: package
        run: |
          ZIP_NAME="dynamic_panelzoom.koplugin.zip"
          TAR_NAME="dynamic_panelzoom.koplugin.tar.gz"
          
          # Package the folder itself (not just its contents) so the structure is preserved
          # Some users prefer zip, others tar.gz. Let's provide both.
          zip -r $ZIP_NAME dynamic_panelzoom.koplugin/
          tar -czvf $TAR_NAME dynamic_panelzoom.koplugin/
          
          # Save filenames for the release step
          echo "zip_name=${ZIP_NAME}" >> $GITHUB_OUTPUT
          echo "tar_name=${TAR_NAME}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ steps.package.outputs.zip_name }}
            ${{ steps.package.outputs.tar_name }}
